###############################################################################
# docker-compose.yml (Unificado - Servidor)
# -----------------------------------------------------------------------------
# Pila Completa de LogAnalyzer: ClickHouse + Backend Fastify + Frontend Next.js
# Servidor destino: 10.100.225.249, usuario SSH: ly
#
# Puertos expuestos a 0.0.0.0:
#   - 80    → Frontend (Next.js Dashboard)
#   - 3001  → Backend API (ingesta de logs + REST/WS para clientes)
#   - 8123  → ClickHouse HTTP Interface
#   - 9001  → ClickHouse Native TCP (remapeado, SonarQube ocupa 9000)
#
# Uso:
#   docker compose up -d --build
###############################################################################

services:
  # 1. ClickHouse Database
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: loganalyzer_clickhouse
    ports:
      - "0.0.0.0:8123:8123"
      - "0.0.0.0:9001:9000"  # Host:9001 → Container:9000 (SonarQube usa 9000)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-loganalyzer}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-default}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - loganalyzer_net

  # 2. LogAnalyzer Backend API (Fastify)
  log-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: loganalyzer_backend
    ports:
      - "0.0.0.0:3001:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - NODE_ENV=production
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-default}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-loganalyzer}
      - FRONTEND_API_KEY=${FRONTEND_API_KEY}
      - INGEST_API_KEY=${INGEST_API_KEY}
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - loganalyzer_net

  # 3. LogAnalyzer Frontend (Next.js)
  log-frontend:
    image: loganalyzer-frontend:latest
    container_name: loganalyzer_frontend
    ports:
      - "0.0.0.0:3000:3000"  # Host: 3000 → Container: 3000
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://log-backend:3001  # URL de comunicación interna de Docker
      - NEXT_PUBLIC_WS_URL=ws://10.100.225.249:3001/ws  # URL para el cliente (navegador)
      - FRONTEND_API_KEY=${FRONTEND_API_KEY}
    depends_on:
      log-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - loganalyzer_net

volumes:
  clickhouse_data:

networks:
  loganalyzer_net:
    driver: bridge
