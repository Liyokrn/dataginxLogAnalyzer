[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# --------------------------------------------------------
# 1. NGINX LOG INGESTION (Handling Non-Standard Paths)
# --------------------------------------------------------
[INPUT]
    Name         tail
    # Supports non-standard locations and dynamic module paths
    Path         /var/log/nginx/*.log, /opt/nginx/logs/*.log, /usr/local/nginx/logs/*.log, /var/www/*/logs/nginx-access.log
    Tag          nginx.*
    Parser       nginx
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

# --------------------------------------------------------
# 2. PHP-FPM LOG INGESTION (Handling Multiple Concurrent Versions)
# --------------------------------------------------------
[INPUT]
    Name         tail
    # CRITICAL constraint: Capture PHP 7.4 through 8.4 inclusively
    # Using wildcards php*-fpm.log to capture everything dynamically
    Path         /var/log/php*-fpm.log, /var/log/php/7.*/fpm.log, /var/log/php/8.*/fpm.log
    Tag          phpfpm.*
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

# --------------------------------------------------------
# 3. DOCKER & KUBERNETES LOG INGESTION (With Automatic Labeling)
# --------------------------------------------------------
[INPUT]
    Name         tail
    Path         /var/log/containers/*.log
    Parser       docker
    Tag          kube.*
    Refresh_Interval  5

[FILTER]
    # Kubernetes filter automatically appends namespace, pod, and container metadata
    Name         kubernetes
    Match        kube.*
    Kube_URL     https://kubernetes.default.svc:443
    Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix kube.var.log.containers.
    Merge_Log    On
    Keep_Log     Off
    K8S-Logging.Parser On
    K8S-Logging.Exclude On

# --------------------------------------------------------
# 4. OUTPUT TO LOGANALYZER INGESTION API
# --------------------------------------------------------
[OUTPUT]
    Name         http
    Match        *
    Host         loganalyzer-api.local # Replace with actual API host
    Port         80
    URI          /api/ingest
    Header       Content-Type application/json
    Format       json
    Retry_Limit  5
