###############################################################################
# docker-compose.frontend.yml
# -----------------------------------------------------------------------------
# Frontend de LogAnalyzer (Next.js) para ejecución local en las PCs del equipo.
# El frontend se conecta al Backend central en el servidor SonarQube vía VPN.
#
# Uso:
#   docker compose -f docker-compose.frontend.yml up -d --build
#
# Requisitos:
#   - Docker Desktop instalado en la PC local.
#   - VPN conectada con acceso a la red 10.100.225.x.
###############################################################################

services:
  # Frontend Web (Next.js)
  log-frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_WS_URL=ws://10.100.225.249:3001/ws
    container_name: loganalyzer_frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://10.100.225.249:3001
      - NEXT_PUBLIC_WS_URL=ws://10.100.225.249:3001/ws
    restart: unless-stopped
