name: Monorepo Auto-Deployment

on:
  push:
    branches:
      - main
      - feature/cicd

jobs:
  # 1. Detect changes in path components
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'packages/**'
              - 'docker-compose.jump-pc.yml'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'apps/web/**'
              - 'packages/**'
              - 'k8s/**'
              - '.github/workflows/deploy.yml'

  deploy-backend:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: latest

      - name: Sync and Deploy via Alpine Container
        uses: docker://alpine:latest
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        with:
          entrypoint: /bin/sh
          args: >
            -c "
            apk add --no-cache rsync sshpass openssh-client &&
            sshpass -p '$SSH_PASSWORD' rsync -avz --exclude 'node_modules' --exclude '.git' --exclude '.next' --exclude 'dist' -e 'ssh -o StrictHostKeyChecking=no' ./ ly@100.84.175.70:/home/ly/workspace/loganalyzer-backend/ &&
            sshpass -p '$SSH_PASSWORD' ssh -o StrictHostKeyChecking=no ly@100.84.175.70 'cd /home/ly/workspace/loganalyzer-backend && echo \"\$SSH_PASSWORD\" | sudo -S docker compose -f docker-compose.jump-pc.yml up -d --build'
            "

  # 3. Deploy Frontend to Kubernetes Cluster
  deploy-frontend:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: latest

      - name: Configure Insecure Registry in Docker
        run: |
          sudo bash -c 'echo "{\"insecure-registries\": [\"100.81.167.109:30500\"]}" > /etc/docker/daemon.json'
          sudo systemctl restart docker

      - name: Login to Private Registry
        run: |
          docker login 100.81.167.109:30500 \
            -u "${{ secrets.REGISTRY_USERNAME }}" \
            -p "${{ secrets.REGISTRY_PASSWORD }}"

      - name: Build and Push Frontend Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_WS_URL="${{ secrets.NEXT_PUBLIC_WS_URL }}" \
            -f apps/web/Dockerfile \
            -t 100.81.167.109:30500/loganalyzer-frontend:${{ github.sha }} \
            -t 100.81.167.109:30500/loganalyzer-frontend:latest \
            .
          docker push 100.81.167.109:30500/loganalyzer-frontend:${{ github.sha }}
          docker push 100.81.167.109:30500/loganalyzer-frontend:latest

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Kubernetes Cluster
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/loganalyzer-frontend frontend=100.81.167.109:30500/loganalyzer-frontend:${{ github.sha }}
          kubectl rollout status deployment/loganalyzer-frontend
