apiVersion: apps/v1
kind: Deployment
metadata:
  name: loganalyzer-frontend
  namespace: default
  labels:
    app: loganalyzer-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loganalyzer-frontend
  template:
    metadata:
      labels:
        app: loganalyzer-frontend
    spec:
      containers:
      - name: frontend
        image: 100.81.167.109:30500/loganalyzer-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: BACKEND_URL
          value: "https://logsanalyzer.lyos.uk"
        - name: FRONTEND_API_KEY
          valueFrom:
            secretKeyRef:
              name: frontend-secrets
              key: FRONTEND_API_KEY
        - name: NEXT_PUBLIC_WS_URL
          value: "wss://logsanalyzer.lyos.uk/ws?token=bddf1f290cd3de32fc53ea3f9c7b4d05bd288981"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
