version: '3.8'

services:
  # 1. ClickHouse Database
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: loganalyzer_clickhouse
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-loganalyzer}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-default}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    networks:
      - loganalyzer_net

  # 2. LogAnalyzer Backend API
  backend_api:
    build: .
    container_name: loganalyzer_backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-default}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-loganalyzer}
    depends_on:
      - clickhouse
    networks:
      - loganalyzer_net

  # 3. Tailscale Sidecar (Optional / For VPN Overlay)
  # Uncomment and configure TS_AUTHKEY to attach the backend to the Tailnet
  # tailscale:
  #   image: tailscale/tailscale:latest
  #   container_name: loganalyzer_tailscale
  #   hostname: loganalyzer-backend
  #   environment:
  #     - TS_AUTHKEY=${TS_AUTHKEY:-}
  #     - TS_STATE_DIR=/var/lib/tailscale
  #   volumes:
  #     - tailscale_data:/var/lib/tailscale
  #     - /dev/net/tun:/dev/net/tun
  #   cap_add:
  #     - net_admin
  #     - sys_module
  #   network_mode: "service:backend_api"

volumes:
  clickhouse_data:
  tailscale_data:

networks:
  loganalyzer_net:
    driver: bridge
